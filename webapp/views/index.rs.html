@use "layout.rs.html" as Layout;

@use "components/About.rs.html"
@use "components/Contact.rs.html"
@use "components/Services.rs.html"

<Layout navbar={<Navbar/>} footer={
    @if self.footer {
        <!-- footer -->
        <footer class="row tm-footer">

            <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12 col-xl-12">

            <p class="text-xs-center tm-footer-text">Copyright &copy; @self.home_time.year() RsHtml</p>

            </div>

        </footer>

        <Home title="Introduction"/>

        <Services title="Our Services"/>

        <About title="About our company"/>

        <Contact title="Send a message"/>

</Layout>
